        // Particle Background Component
        const ParticleBackground = () => {
            useEffect(() => {
                const canvas = document.getElementById('particle-canvas');
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let particles = [];
                let animationId;

                const resizeCanvas = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };

                const createParticles = () => {
                    particles = [];
                    for (let i = 0; i < 80; i++) {
                        particles.push({
                            x: Math.random() * canvas.width,
                            y: Math.random() * canvas.height,
                            radius: Math.random() * 2 + 1,
                            speedX: (Math.random() - 0.5) * 0.5,
                            speedY: (Math.random() - 0.5) * 0.3,
                            color: `rgba(79, 70, 229, ${Math.random() * 0.3 + 0.1})`
                        });
                    }
                };

                const drawParticles = () => {
                    if (!ctx) return;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    particles.forEach(particle => {
                        ctx.beginPath();
                        ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
                        ctx.fillStyle = particle.color;
                        ctx.fill();
                        particle.x += particle.speedX;
                        particle.y += particle.speedY;
                        if (particle.x < 0) particle.x = canvas.width;
                        if (particle.x > canvas.width) particle.x = 0;
                        if (particle.y < 0) particle.y = canvas.height;
                        if (particle.y > canvas.height) particle.y = 0;
                    });
                    animationId = requestAnimationFrame(drawParticles);
                };

                resizeCanvas();
                createParticles();
                drawParticles();
                window.addEventListener('resize', () => { resizeCanvas(); createParticles(); });
                return () => { cancelAnimationFrame(animationId); window.removeEventListener('resize', resizeCanvas); };
            }, []);
            return <canvas id="particle-canvas" className="fixed top-0 left-0 w-full h-full pointer-events-none" style={{ zIndex: 0 }}></canvas>;
        };

        const useScrollReveal = () => {
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('opacity-100', 'translate-y-0');
                            entry.target.classList.remove('opacity-0', 'translate-y-10');
                        }
                    });
                }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
                document.querySelectorAll('.reveal-on-scroll').forEach(el => observer.observe(el));
                return () => observer.disconnect();
            }, []);
        };

        const SkillCounter = ({ targetValue }) => {
            const [count, setCount] = useState(0);

            const hasAnimated = useRef(false);
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    if (entries[0].isIntersecting && !hasAnimated.current) {
                        hasAnimated.current = true;
                        let start = 0;
                        const duration = 1500;
                        const increment = targetValue / (duration / 16);
                        const timer = setInterval(() => {
                            start += increment;
                            if (start >= targetValue) { setCount(targetValue); clearInterval(timer); }
                            else setCount(Math.floor(start));
                        }, 16);
                        return () => clearInterval(timer);
                    }
                }, { threshold: 0.5 });
                if (elementRef.current) observer.observe(elementRef.current);
                return () => observer.disconnect();
            }, [targetValue]);
            return <span ref={elementRef}>{count}%</span>;

                                        <div key={project.id} className="glass-card rounded-2xl overflow-hidden shadow-xl hover:scale-[1.02] transition-transform duration-300">
                                            <img src={project.image} alt={project.title} className="w-full h-48 object-cover" />
                                            <div className="p-6"><h3 className="text-2xl font-bold mb-2 text-gray-800 dark:text-white">{project.title}</h3><p className="text-gray-600 dark:text-gray-300 mb-4">{project.description}</p><p className="text-sm text-indigo-600 dark:text-cyan-400 mb-4"><i className="fas fa-code"></i> {project.tech}</p><div className="flex gap-4"><a href="#" className="text-gray-700 dark:text-white hover:text-indigo-600"><i className="fab fa-github"></i> GitHub</a><a href="#" className="text-gray-700 dark:text-white hover:text-cyan-600"><i className="fas fa-external-link-alt"></i> Live Demo</a></div></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        <section id="certifications" className="py-20 px-6 bg-gray-50 dark:bg-gray-900">
                            <div className="container mx-auto reveal-on-scroll opacity-0 translate-y-10 transition-all duration-700">
                                <h2 className="text-4xl font-bold text-center mb-12">Certifications</h2>
                                <div className="grid sm:grid-cols-2 md:grid-cols-3 gap-6 mb-16">
                                    {certifications.map((cert, idx) => (<div key={idx} className="glass-card p-6 text-center rounded-2xl"><i className="fas fa-certificate text-4xl text-indigo-600 mb-3"></i><h3 className="font-bold text-xl text-gray-800 dark:text-white">{cert}</h3><p className="text-sm text-gray-500">Verified Credential</p></div>))}
                                </div>
                                <h2 className="text-4xl font-bold text-center mb-12">Achievements</h2>
                                <div className="grid sm:grid-cols-2 md:grid-cols-3 gap-6">
                                    {achievements.map((ach, idx) => (<div key={idx} className="glass-card p-6 rounded-2xl flex items-center gap-3"><i className="fas fa-trophy text-2xl text-yellow-500"></i><span className="font-semibold text-gray-800 dark:text-white">{ach}</span></div>))}
                                </div>
                            </div>
                        </section>

                        <section id="contact" className="py-20 px-6 bg-white dark:bg-gray-800/50">
                            <div className="container mx-auto max-w-4xl reveal-on-scroll opacity-0 translate-y-10 transition-all duration-700">
                                <h2 className="text-4xl font-bold text-center mb-12">Get In <span className="text-indigo-600">Touch</span></h2>
                                <form onSubmit={sendEmail} className="space-y-6">
                                    <div className="grid md:grid-cols-2 gap-6">
                                        <div><input type="text" name="name" placeholder="Full Name" value={formData.name} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border dark:bg-gray-900 dark:text-white focus:ring-2 focus:ring-indigo-500" /><p className="text-red-500 text-sm">{formErrors.name}</p></div>
                                        <div><input type="email" name="email" placeholder="Email" value={formData.email} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border dark:bg-gray-900 dark:text-white focus:ring-2 focus:ring-indigo-500" /><p className="text-red-500 text-sm">{formErrors.email}</p></div>
                                    </div>
                                    <div><input type="tel" name="phone" placeholder="Phone Number" value={formData.phone} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border dark:bg-gray-900 dark:text-white focus:ring-2 focus:ring-indigo-500" /><p className="text-red-500 text-sm">{formErrors.phone}</p></div>
                                    <div><textarea name="message" rows="5" placeholder="Your Message" value={formData.message} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border dark:bg-gray-900 dark:text-white focus:ring-2 focus:ring-indigo-500"></textarea><p className="text-red-500 text-sm">{formErrors.message}</p></div>
                                    <button type="submit" disabled={isSending} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-semibold transition disabled:opacity-70">{isSending ? 'Sending...' : 'Send Message'} <i className="fas fa-paper-plane ml-2"></i></button>
                                </form>
                                <div className="text-center mt-8 text-gray-600 dark:text-gray-400">
                                    <p><i className="fas fa-envelope mr-2"></i> janithsaik@gmail.com</p>
                                </div>
                            </div>
                        </section>
                    </main>

                    <footer className="bg-gray-900 text-white py-8 text-center"><p>© 2025 Kosuri Janith Sai. All rights reserved. | AI Engineer Portfolio</p><div className="flex justify-center space-x-4 mt-4"><a href="#" className="hover:text-cyan-400"><i className="fab fa-github"></i></a><a href="#" className="hover:text-cyan-400"><i className="fab fa-linkedin"></i></a></div></footer>
                    <button onClick={scrollToTop} className="fixed bottom-6 right-6 bg-indigo-600 hover:bg-cyan-500 text-white p-3 rounded-full shadow-lg transition z-50"><i className="fas fa-arrow-up"></i></button>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
