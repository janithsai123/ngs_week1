<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Professional portfolio of Kosuri Janith Sai - Computer Science Engineering student specializing in AI, ML, AI Agents, and Python Development. Showcasing projects, skills, and achievements.">
    <meta name="keywords" content="AI Engineer, Portfolio, Python Developer, Machine Learning, AI Agents, Computer Science Student">
    <meta name="author" content="Kosuri Janith Sai">
    <title>Kosuri Janith Sai | AI Engineer & Developer Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],

                        'float': 'float 6s ease-in-out infinite',

                    },
                    keyframes: {
                        gradient: {
                            '0%, 100%': { 'background-position': '0% 50%' },
                            '50%': { 'background-position': '100% 50%' },
                        },
                        float: {

                            '50%': { transform: 'translateY(-20px)' },
                        }

                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Smooth scroll behavior */
        html {
            scroll-behavior: smooth;
        }
        /* Glassmorphism card style */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }
        .dark .glass-card {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(79, 70, 229, 0.2);
        }
        /* Progress bar animation */
        .progress-fill {
            transition: width 1.5s ease-in-out;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #4F46E5;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #06B6D4;
        }
        /* Typing effect */
        .typing-text::after {
            content: '|';
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        /* Hide scrollbar for particle container */
        .particle-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
    </style>
</head>
<body class="font-sans bg-gray-50 dark:bg-gray-900 transition-colors duration-300">
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/babel-standalone@6.26.0/babel.min.js"></script>

    <script type="text/babel">
        // Custom hooks and components
        const { useState, useEffect, useRef } = React;

        // Particle Background Component
        const ParticleBackground = () => {
            useEffect(() => {
                const canvas = document.getElementById('particle-canvas');
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let particles = [];
                let animationId;

                const resizeCanvas = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };

                const createParticles = () => {
                    particles = [];
                    for (let i = 0; i < 80; i++) {
                        particles.push({
                            x: Math.random() * canvas.width,
                            y: Math.random() * canvas.height,
                            radius: Math.random() * 2 + 1,
                            speedX: (Math.random() - 0.5) * 0.5,
                            speedY: (Math.random() - 0.5) * 0.3,
                            color: `rgba(79, 70, 229, ${Math.random() * 0.3 + 0.1})`
                        });
                    }
                };

                const drawParticles = () => {
                    if (!ctx) return;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    particles.forEach(particle => {
                        ctx.beginPath();
                        ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
                        ctx.fillStyle = particle.color;
                        ctx.fill();

                        particle.x += particle.speedX;
                        particle.y += particle.speedY;

                        if (particle.x < 0) particle.x = canvas.width;
                        if (particle.x > canvas.width) particle.x = 0;
                        if (particle.y < 0) particle.y = canvas.height;
                        if (particle.y > canvas.height) particle.y = 0;
                    });
                    animationId = requestAnimationFrame(drawParticles);
                };

                resizeCanvas();
                createParticles();
                drawParticles();
                window.addEventListener('resize', () => {
                    resizeCanvas();
                    createParticles();
                });

                return () => {
                    cancelAnimationFrame(animationId);
                    window.removeEventListener('resize', resizeCanvas);
                };
            }, []);

            return <canvas id="particle-canvas" className="fixed top-0 left-0 w-full h-full pointer-events-none" style={{ zIndex: 0 }}></canvas>;
        };

        // Scroll Reveal Hook
        const useScrollReveal = () => {
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('opacity-100', 'translate-y-0');
                            entry.target.classList.remove('opacity-0', 'translate-y-10');
                        }
                    });
                }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

                document.querySelectorAll('.reveal-on-scroll').forEach(el => observer.observe(el));
                return () => observer.disconnect();
            }, []);
        };

        // Skill Counter Animation
        const SkillCounter = ({ targetValue, skillName }) => {
            const [count, setCount] = useState(0);
            const elementRef = useRef(null);
            const hasAnimated = useRef(false);

            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    if (entries[0].isIntersecting && !hasAnimated.current) {
                        hasAnimated.current = true;
                        let start = 0;
                        const duration = 1500;
                        const increment = targetValue / (duration / 16);
                        const timer = setInterval(() => {
                            start += increment;
                            if (start >= targetValue) {
                                setCount(targetValue);
                                clearInterval(timer);
                            } else {
                                setCount(Math.floor(start));
                            }
                        }, 16);
                        return () => clearInterval(timer);
                    }
                }, { threshold: 0.5 });
                if (elementRef.current) observer.observe(elementRef.current);
                return () => observer.disconnect();
            }, [targetValue]);

            return <span ref={elementRef}>{count}%</span>;
        };

        // Main App Component
        const App = () => {
            const [darkMode, setDarkMode] = useState(false);
            const [filter, setFilter] = useState('all');
            const [formData, setFormData] = useState({ name: '', email: '', phone: '', message: '' });
            const [formErrors, setFormErrors] = useState({});

            useEffect(() => {
                if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    setDarkMode(true);
                    document.documentElement.classList.add('dark');
                } else {
                    setDarkMode(false);
                    document.documentElement.classList.remove('dark');
                }
            }, []);

            const toggleDarkMode = () => {
                setDarkMode(!darkMode);
                if (!darkMode) {
                    document.documentElement.classList.add('dark');
                    localStorage.theme = 'dark';
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.theme = 'light';
                }
            };

            useScrollReveal();

            const projects = [
                { id: 1, category: 'ai', title: 'AI Agent Builder', description: 'Built AI agent workflows and explored autonomous AI systems capable of performing tasks intelligently.', tech: 'Python, LangChain, OpenAI API', image: 'https://placehold.co/600x400/0F172A/4F46E5?text=AI+Agent+Builder', github: '#', demo: '#' },
                { id: 2, category: 'automation', title: 'Smart Automation Assistant', description: 'Designed automation workflows using AI tools and prompt engineering techniques.', tech: 'Python, Automation, AI Tools', image: 'https://placehold.co/600x400/0F172A/06B6D4?text=Smart+Automation', github: '#', demo: '#' },
                { id: 3, category: 'web', title: 'Student Portfolio Website', description: 'Developed a responsive personal portfolio website showcasing skills, projects, and achievements.', tech: 'React, Tailwind CSS', image: 'https://placehold.co/600x400/4F46E5/FFFFFF?text=Portfolio+Website', github: '#', demo: '#' },
                { id: 4, category: 'data', title: 'Data Analysis Dashboard', description: 'Created dashboards using Excel and data visualization techniques to analyze business data.', tech: 'Excel, Power BI, Python Pandas', image: 'https://placehold.co/600x400/06B6D4/0F172A?text=Data+Dashboard', github: '#', demo: '#' }
            ];

            const filteredProjects = filter === 'all' ? projects : projects.filter(p => p.category === filter);

            const certifications = ['Python Programming', 'Artificial Intelligence', 'Machine Learning', 'Data Analytics', 'Web Development', 'Prompt Engineering'];

            const handleInputChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
                if (formErrors[e.target.name]) {
                    setFormErrors({ ...formErrors, [e.target.name]: '' });
                }
            };

            const validateForm = () => {
                const errors = {};
                if (!formData.name.trim()) errors.name = 'Name is required';
                if (!formData.email.trim()) errors.email = 'Email is required';
                else if (!/\S+@\S+\.\S+/.test(formData.email)) errors.email = 'Email is invalid';
                if (!formData.phone.trim()) errors.phone = 'Phone number is required';
                if (!formData.message.trim()) errors.message = 'Message is required';
                return errors;
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const errors = validateForm();
                if (Object.keys(errors).length === 0) {
                    alert('Thank you! Your message has been sent successfully.');
                    setFormData({ name: '', email: '', phone: '', message: '' });
                } else {
                    setFormErrors(errors);
                }
            };

            const downloadResume = () => {
                alert('Resume download started! (Sample functionality)');
                // In production, link to actual resume PDF
            };

            const scrollToTop = () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            return (
                <div className="relative min-h-screen">
                    <ParticleBackground />
                    
                    {/* Header / Navbar */}
                    <nav className="fixed top-0 w-full z-50 glass-card dark:bg-gray-900/80 backdrop-blur-md shadow-md">
                        <div className="container mx-auto px-6 py-4 flex justify-between items-center">
                            <a href="#" className="text-2xl font-bold bg-gradient-to-r from-indigo-600 to-cyan-500 bg-clip-text text-transparent">KJS</a>
                            <div className="hidden md:flex space-x-8">
                                {['Home', 'About', 'Skills', 'Projects', 'Certifications', 'Contact'].map(section => (
                                    <a key={section} href={`#${section.toLowerCase()}`} className="text-gray-700 dark:text-gray-300 hover:text-indigo-600 dark:hover:text-cyan-400 transition font-medium">{section}</a>
                                ))}
                            </div>
                            <button onClick={toggleDarkMode} className="p-2 rounded-full bg-gray-200 dark:bg-gray-800 text-gray-800 dark:text-yellow-400 transition">
                                <i className={`fas ${darkMode ? 'fa-sun' : 'fa-moon'} text-xl`}></i>
                            </button>
                        </div>
                    </nav>

                    <main className="pt-20">
                        {/* Hero Section */}
                        <section id="home" className="relative min-h-screen flex items-center justify-center px-6 py-20">
                            <div className="container mx-auto grid md:grid-cols-2 gap-12 items-center reveal-on-scroll opacity-0 translate-y-10 transition-all duration-700">
                                <div className="space-y-6">
                                    <h1 className="text-5xl md:text-7xl font-extrabold text-gray-900 dark:text-white">Kosuri Janith Sai</h1>
                                    <p className="text-xl md:text-2xl text-indigo-600 dark:text-cyan-400 font-semibold typing-text">Computer Science Engineering Student | AI Enthusiast | Python Developer | Future AI Agent Engineer</p>
                                    <p className="text-gray-600 dark:text-gray-300 leading-relaxed">I am a passionate Computer Science Engineering student focused on Artificial Intelligence, Machine Learning, AI Agents, Automation, and Software Development. I enjoy building intelligent systems, solving real-world problems, and continuously learning emerging technologies.</p>
                                    <div className="flex flex-wrap gap-4">
                                        <button onClick={downloadResume} className="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl transition shadow-lg flex items-center gap-2"><i className="fas fa-download"></i> Download Resume</button>
                                        <a href="#contact" className="px-6 py-3 border-2 border-indigo-600 text-indigo-600 dark:text-cyan-400 hover:bg-indigo-50 dark:hover:bg-gray-800 rounded-xl transition flex items-center gap-2"><i className="fas fa-envelope"></i> Contact Me</a>
                                        <a href="#projects" className="px-6 py-3 bg-gray-200 dark:bg-gray-800 text-gray-800 dark:text-white rounded-xl transition flex items-center gap-2"><i className="fas fa-code-branch"></i> View Projects</a>
                                    </div>
                                    <div className="flex space-x-5 pt-4">
                                        <a href="#" className="text-gray-600 dark:text-gray-400 hover:text-indigo-600 text-2xl transition"><i className="fab fa-github"></i></a>
                                        <a href="#" className="text-gray-600 dark:text-gray-400 hover:text-indigo-600 text-2xl transition"><i className="fab fa-linkedin"></i></a>
                                        <a href="#" className="text-gray-600 dark:text-gray-400 hover:text-indigo-600 text-2xl transition"><i className="fab fa-twitter"></i></a>
                                    </div>
                                </div>
                                <div className="flex justify-center">
                                    <div className="relative w-72 h-72 md:w-96 md:h-96 rounded-full overflow-hidden border-4 border-indigo-500 shadow-2xl animate-float">
                                        <div className="w-full h-full bg-gradient-to-br from-indigo-400 to-cyan-500 flex items-center justify-center text-white text-6xl font-bold">
                                            <i className="fas fa-user-astronaut text-8xl"></i>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* About Section */}
                        <section id="about" className="py-20 px-6 bg-white dark:bg-gray-800/50">
                            <div className="container mx-auto reveal-on-scroll opacity-0 translate-y-10 transition-all duration-700">
                                <h2 className="text-4xl font-bold text-center mb-12 text-gray-900 dark:text-white">About <span className="text-indigo-600 dark:text-cyan-400">Me</span></h2>
                                <div className="grid md:grid-cols-2 gap-10">
                                    <div className="space-y-4 text-gray-700 dark:text-gray-300">
                                        <p>Computer Science Engineering student with strong interest in Artificial Intelligence, AI Agents, and Agentic AI systems. Skilled in Python Programming, Data Structures & Algorithms, and Web Development. Passionate about Automation and Problem Solving.</p>
                                        <div className="mt-6"><h3 className="text-xl font-semibold text-indigo-600">Career Objective</h3><p>To secure a position as an AI Engineer where I can leverage my skills in machine learning, AI agents, and software development to build impactful intelligent solutions.</p></div>
                                    </div>
                                    <div className="space-y-4"><h3 className="text-xl font-semibold text-indigo-600">Education Timeline</h3>
                                        <div className="border-l-4 border-indigo-500 pl-4"><p className="font-bold">Bachelor of Technology (B.Tech)</p><p>Computer Science Engineering | Current Student</p><p className="text-sm text-gray-500">2022 - 2026</p></div>
                                        <div className="border-l-4 border-indigo-500 pl-4"><p className="font-bold">Higher Secondary Education</p><p>MPC | 94%</p><p className="text-sm text-gray-500">2020 - 2022</p></div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* Skills Section with Animated Progress Bars */}
                        <section id="skills" className="py-20 px-6 bg-gray-50 dark:bg-gray-900">
                            <div className="container mx-auto reveal-on-scroll opacity-0 translate-y-10 transition-all duration-700">
                                <h2 className="text-4xl font-bold text-center mb-12 text-gray-900 dark:text-white">Technical <span className="text-indigo-600 dark:text-cyan-400">Skills</span></h2>
                                <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {[
                                        { name: 'Python', level: 90 }, { name: 'C', level: 75 }, { name: 'SQL', level: 80 }, { name: 'Machine Learning', level: 70 }, { name: 'Prompt Engineering', level: 85 }, { name: 'AI Agents', level: 75 }, { name: 'JavaScript', level: 70 }, { name: 'React', level: 65 }, { name: 'Data Analysis', level: 75 }
                                    ].map(skill => (
                                        <div key={skill.name} className="glass-card rounded-xl p-5">
                                            <div className="flex justify-between mb-2"><span className="font-semibold">{skill.name}</span><span className="text-indigo-600"><SkillCounter targetValue={skill.level} skillName={skill.name} /></span></div>
                                            <div className="w-full bg-gray-200 rounded-full h-2.5"><div className="bg-gradient-to-r from-indigo-600 to-cyan-500 h-2.5 rounded-full progress-fill" style={{ width: `${skill.level}%` }}></div></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* Projects Section with Filtering */}
                        <section id="projects" className="py-20 px-6 bg-white dark:bg-gray-800/50">
                            <div className="container mx-auto reveal-on-scroll opacity-0 translate-y-10 transition-all duration-700">
                                <h2 className="text-4xl font-bold text-center mb-8 text-gray-900 dark:text-white">Featured <span className="text-indigo-600 dark:text-cyan-400">Projects</span></h2>
                                <div className="flex flex-wrap justify-center gap-3 mb-10">
                                    {['all', 'ai', 'automation', 'web', 'data'].map(cat => (<button key={cat} onClick={() => setFilter(cat)} className={`px-5 py-2 rounded-full capitalize transition ${filter === cat ? 'bg-indigo-600 text-white' : 'bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300 hover:bg-indigo-500 hover:text-white'}`}>{cat}</button>))}
                                </div>
                                <div className="grid md:grid-cols-2 lg:grid-cols-2 gap-8">
                                    {filteredProjects.map(project => (
                                        <div key={project.id} className="glass-card rounded-2xl overflow-hidden shadow-xl hover:scale-[1.02] transition-transform duration-300">
                                            <img src={project.image} alt={project.title} className="w-full h-48 object-cover" />
                                            <div className="p-6"><h3 className="text-2xl font-bold mb-2">{project.title}</h3><p className="text-gray-600 dark:text-gray-300 mb-4">{project.description}</p><p className="text-sm text-indigo-600 mb-4"><i className="fas fa-code"></i> {project.tech}</p><div className="flex gap-4"><a href="#" className="text-gray-700 dark:text-white hover:text-indigo-600"><i className="fab fa-github"></i> GitHub</a><a href="#" className="text-gray-700 dark:text-white hover:text-cyan-600"><i className="fas fa-external-link-alt"></i> Live Demo</a></div></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* Certifications Section */}
                        <section id="certifications" className="py-20 px-6 bg-gray-50 dark:bg-gray-900">
                            <div className="container mx-auto reveal-on-scroll opacity-0 translate-y-10 transition-all duration-700">
                                <h2 className="text-4xl font-bold text-center mb-12">Certifications</h2>
                                <div className="grid sm:grid-cols-2 md:grid-cols-3 gap-6">{certifications.map((cert, idx) => (<div key={idx} className="glass-card p-6 text-center rounded-2xl"><i className="fas fa-certificate text-4xl text-indigo-600 mb-3"></i><h3 className="font-bold text-xl">{cert}</h3><p className="text-sm text-gray-500">Verified Credential</p></div>))}</div>
                            </div>
                        </section>

                        {/* Contact Section */}
                        <section id="contact" className="py-20 px-6 bg-white dark:bg-gray-800/50">
                            <div className="container mx-auto max-w-4xl reveal-on-scroll opacity-0 translate-y-10 transition-all duration-700">
                                <h2 className="text-4xl font-bold text-center mb-12">Get In <span className="text-indigo-600">Touch</span></h2>
                                <form onSubmit={handleSubmit} className="space-y-6">
                                    <div className="grid md:grid-cols-2 gap-6"><div><input type="text" name="name" placeholder="Full Name" value={formData.name} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border dark:bg-gray-900 focus:ring-2 focus:ring-indigo-500" /><p className="text-red-500 text-sm">{formErrors.name}</p></div>
                                    <div><input type="email" name="email" placeholder="Email" value={formData.email} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border dark:bg-gray-900 focus:ring-2 focus:ring-indigo-500" /><p className="text-red-500 text-sm">{formErrors.email}</p></div></div>
                                    <div><input type="tel" name="phone" placeholder="Phone Number" value={formData.phone} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border dark:bg-gray-900 focus:ring-2 focus:ring-indigo-500" /><p className="text-red-500 text-sm">{formErrors.phone}</p></div>
                                    <div><textarea name="message" rows="5" placeholder="Your Message" value={formData.message} onChange={handleInputChange} className="w-full px-4 py-3 rounded-xl border dark:bg-gray-900 focus:ring-2 focus:ring-indigo-500"></textarea><p className="text-red-500 text-sm">{formErrors.message}</p></div>
                                    <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-semibold transition">Send Message <i className="fas fa-paper-plane ml-2"></i></button>
                                </form>
                            </div>
                        </section>
                    </main>

                    {/* Footer */}
                    <footer className="bg-gray-900 text-white py-8 text-center"><p>© 2025 Kosuri Janith Sai. All rights reserved. | AI Engineer Portfolio</p><div className="flex justify-center space-x-4 mt-4"><a href="#" className="hover:text-cyan-400"><i className="fab fa-github"></i></a><a href="#" className="hover:text-cyan-400"><i className="fab fa-linkedin"></i></a></div></footer>

                    {/* Back to Top Button */}
                    <button onClick={scrollToTop} className="fixed bottom-6 right-6 bg-indigo-600 hover:bg-cyan-500 text-white p-3 rounded-full shadow-lg transition z-50"><i className="fas fa-arrow-up"></i></button>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
